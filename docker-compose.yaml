services:
  postgres:
    image: postgres:16
    container_name: loan_postgres
    environment:
      POSTGRES_DB: loandb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loan_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_NAME: loandb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loan_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: